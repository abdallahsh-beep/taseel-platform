# إعداد Firebase App Hosting لتشغيل منصة تأصيل (Next.js 16)
# القيم الحسّاسة تُدار كأسرار عبر Cloud Secret Manager (تُنشأ بأمر firebase apphosting:secrets:set)

runConfig:
  minInstances: 0
  maxInstances: 2
  cpu: 1
  memoryMiB: 512
  concurrency: 80

env:
  # وضع الإنتاج
  - variable: NODE_ENV
    value: production
    availability:
      - BUILD
      - RUNTIME

  # مفتاح تشفير Server Actions — يجب أن يكون ثابتاً وحاضراً وقت البناء (يُدمَج في البناء)
  - variable: NEXT_SERVER_ACTIONS_ENCRYPTION_KEY
    secret: NEXT_SERVER_ACTIONS_ENCRYPTION_KEY
    availability:
      - BUILD
      - RUNTIME

  # سر توقيع الجلسات (HMAC للكوكيز)
  - variable: SESSION_SECRET
    secret: SESSION_SECRET
    availability:
      - RUNTIME

  # قاعدة بيانات Supabase (PostgreSQL): المجمّعة للتشغيل + المباشرة للهجرات
  - variable: DATABASE_URL
    secret: DATABASE_URL
    availability:
      - BUILD
      - RUNTIME
  - variable: DIRECT_URL
    secret: DIRECT_URL
    availability:
      - BUILD
      - RUNTIME

  # تخزين الوسائط (Supabase Storage)
  - variable: SUPABASE_URL
    secret: SUPABASE_URL
    availability:
      - RUNTIME
  - variable: SUPABASE_SERVICE_ROLE_KEY
    secret: SUPABASE_SERVICE_ROLE_KEY
    availability:
      - RUNTIME

  # (اختياري) لتفعيل توليد النص بالذكاء الاصطناعي: أنشئ السر ANTHROPIC_API_KEY
  # ثم أزل التعليق عن المدخل التالي وأعد النشر.
  # - variable: ANTHROPIC_API_KEY
  #   secret: ANTHROPIC_API_KEY
  #   availability:
  #     - RUNTIME
